<script>
        function toggleForm(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('border-secondary', 'text-primary');
                loginTab.classList.remove('border-transparent', 'text-on-surface-variant');
                registerTab.classList.add('border-transparent', 'text-on-surface-variant');
                registerTab.classList.remove('border-secondary', 'text-primary');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('border-secondary', 'text-primary');
                registerTab.classList.remove('border-transparent', 'text-on-surface-variant');
                loginTab.classList.add('border-transparent', 'text-on-surface-variant');
                loginTab.classList.remove('border-secondary', 'text-primary');
            }
        }

        // Micro-interaction for inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.material-symbols-outlined')?.classList.add('text-secondary');
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.material-symbols-outlined')?.classList.remove('text-secondary');
            });
        });
    </script>
